<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ShopMicro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; }

        .navbar-search .form-control { border-radius: 0 4px 4px 0; }
        .navbar-search .input-group-text { background: #fff; border-right: 0; border-radius: 4px 0 0 4px; }
        .navbar-search .form-control:focus { box-shadow: none; border-color: #ced4da; }

        .product-card { transition: box-shadow .15s, transform .15s; }
        .product-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1) !important; transform: translateY(-2px); }

        .product-img {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .badge-count {
            position: absolute;
            top: -6px; right: -6px;
            font-size: 10px;
            min-width: 18px; height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .method-btn { min-width: 100px; }
        #offcanvasCart  { width: 380px; }
        #offcanvasAdmin { width: 420px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark shadow-sm sticky-top py-2">
    <div class="container gap-3 flex-nowrap">
        <a class="navbar-brand fw-bold fs-5 flex-shrink-0" href="#">
            <i class="bi bi-box-seam me-1"></i>ShopMicro
        </a>

        <div class="input-group navbar-search flex-grow-1">
            <span class="input-group-text text-muted border-end-0">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control" id="search-input"
                   placeholder="Buscar produtos..." oninput="filterProducts()">
        </div>

        <div class="d-flex align-items-center gap-2 flex-shrink-0">
            <span id="service-status"></span>
            <button class="btn btn-outline-secondary btn-sm" onclick="openAdmin()" title="Painel Admin">
                <i class="bi bi-gear"></i>
            </button>
            <div class="position-relative">
                <button class="btn btn-outline-light btn-sm" onclick="openCart()">
                    <i class="bi bi-cart3 fs-6"></i>
                </button>
                <span class="badge bg-danger badge-count rounded-pill d-none" id="badge-count">0</span>
            </div>
        </div>
    </div>
</nav>

<!-- Main -->
<div class="container my-4">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
        <div class="d-flex flex-wrap gap-2" id="category-filters"></div>
        <small class="text-muted" id="product-info">carregando...</small>
    </div>

    <div class="row g-3" id="product-grid">
        <div class="col-12 text-center py-5 text-muted">
            <div class="spinner-border spinner-border-sm me-2"></div>carregando produtos...
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="border-top bg-white py-4 mt-5">
    <div class="container text-center text-muted small">
        &copy; 2025 ShopMicro &mdash; Projeto de estudos de microsserviços
    </div>
</footer>


<!-- Offcanvas: Cart -->
<div class="offcanvas offcanvas-end" id="offcanvasCart" tabindex="-1">
    <div class="offcanvas-header border-bottom">
        <h6 class="offcanvas-title fw-bold"><i class="bi bi-cart3 me-2"></i>Carrinho</h6>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
        <div id="cart-list" class="flex-grow-1 p-3" style="overflow-y:auto"></div>
        <div class="p-3 border-top bg-white">
            <div class="d-flex justify-content-between fw-bold mb-3">
                <span>Total</span>
                <span id="cart-total">R$ 0,00</span>
            </div>
            <button class="btn btn-dark w-100" id="btn-checkout" disabled onclick="openCheckout()">
                <i class="bi bi-lock me-1"></i>Finalizar compra
            </button>
        </div>
    </div>
</div>


<!-- Modal: Payment -->
<div class="modal fade" id="modalPayment" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title fw-bold">Resumo do pedido</h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="order-summary" class="mb-3"></div>
                <hr>
                <p class="mb-2 fw-semibold small">Forma de pagamento</p>
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-outline-secondary btn-sm method-btn" id="m-pix"    onclick="selectMethod('pix')">
                        <i class="bi bi-qr-code-scan me-1"></i>PIX
                    </button>
                    <button class="btn btn-outline-secondary btn-sm method-btn" id="m-card"   onclick="selectMethod('card')">
                        <i class="bi bi-credit-card me-1"></i>Cartão
                    </button>
                    <button class="btn btn-outline-secondary btn-sm method-btn" id="m-boleto" onclick="selectMethod('boleto')">
                        <i class="bi bi-upc me-1"></i>Boleto
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Voltar</button>
                <button class="btn btn-dark btn-sm" id="btn-confirm-payment" disabled onclick="confirmPayment()">
                    Confirmar pagamento
                </button>
            </div>
        </div>
    </div>
</div>


<!-- Modal: Payment result -->
<div class="modal fade" id="modalResult" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content text-center p-4">
            <div id="payment-result"></div>
            <button class="btn btn-dark btn-sm mt-3" data-bs-dismiss="modal">
                Continuar comprando
            </button>
        </div>
    </div>
</div>


<!-- Offcanvas: Admin -->
<div class="offcanvas offcanvas-end" id="offcanvasAdmin" tabindex="-1">
    <div class="offcanvas-header border-bottom">
        <h6 class="offcanvas-title fw-bold"><i class="bi bi-gear me-2"></i>Painel Admin</h6>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <ul class="nav nav-tabs px-3 pt-2">
            <li class="nav-item">
                <button class="nav-link active" id="tab-add" onclick="showAdminTab('add')">
                    <i class="bi bi-plus-circle me-1"></i>Novo Produto
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-stock" onclick="showAdminTab('stock')">
                    <i class="bi bi-boxes me-1"></i>Estoque
                </button>
            </li>
        </ul>

        <div id="admin-add" class="p-3">
            <form onsubmit="adminAddProduct(event)">
                <div class="mb-2">
                    <label class="form-label small fw-semibold">Nome</label>
                    <input type="text" class="form-control form-control-sm" id="a-name" required>
                </div>
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Preço (R$)</label>
                        <input type="number" class="form-control form-control-sm" id="a-price" min="0" step="0.01" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-semibold">Estoque inicial</label>
                        <input type="number" class="form-control form-control-sm" id="a-stock" min="0" required>
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label small fw-semibold">Categoria</label>
                    <select class="form-select form-select-sm" id="a-category" required>
                        <option value="">Selecione...</option>
                        <option>Informática</option>
                        <option>Periféricos</option>
                        <option>Monitores</option>
                        <option>Áudio</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Descrição</label>
                    <textarea class="form-control form-control-sm" id="a-description" rows="2" required></textarea>
                </div>
                <button type="submit" class="btn btn-dark btn-sm w-100" id="btn-add-product">
                    <i class="bi bi-plus-lg me-1"></i>Adicionar Produto
                </button>
            </form>
        </div>

        <div id="admin-stock" class="p-3 d-none">
            <div id="admin-stock-list"></div>
        </div>
    </div>
</div>


<!-- Toasts -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999" id="toasts-area"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
